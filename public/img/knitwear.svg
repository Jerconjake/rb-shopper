<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#251f18"/>
      <stop offset="100%" stop-color="#1c1814"/>
    </linearGradient>
    <!-- Subtle diagonal texture -->
    <pattern id="tex" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <line x1="0" y1="20" x2="20" y2="0" stroke="#f0e6d8" stroke-width="0.3" opacity="0.06"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="520" fill="url(#bg)"/>
  <rect width="400" height="520" fill="url(#tex)"/>
  
  <!-- Corner accent lines -->
  <line x1="20" y1="20" x2="60" y2="20" stroke="#c9835a" stroke-width="0.8" opacity="0.5"/>
  <line x1="20" y1="20" x2="20" y2="60" stroke="#c9835a" stroke-width="0.8" opacity="0.5"/>
  <line x1="380" y1="500" x2="340" y2="500" stroke="#c9835a" stroke-width="0.8" opacity="0.5"/>
  <line x1="380" y1="500" x2="380" y2="460" stroke="#c9835a" stroke-width="0.8" opacity="0.5"/>
  
  <!-- Icon area -->
  <g transform="translate(0, 40)">
    
        <!-- Sweater with knit texture lines -->
        <path d="M 150 80 L 110 130 L 90 160 L 90 330 L 310 330 L 310 160 L 290 130 L 250 80 Q 200 100 150 80 Z" 
              fill="none" stroke="#8a7a6a" stroke-width="1.5" opacity="0.5"/>
        <!-- Knit texture -->
        <line x1="110" y1="200" x2="290" y2="200" stroke="#8a7a6a" stroke-width="0.8" opacity="0.3"/>
        <line x1="105" y1="220" x2="295" y2="220" stroke="#8a7a6a" stroke-width="0.8" opacity="0.3"/>
        <line x1="100" y1="240" x2="300" y2="240" stroke="#8a7a6a" stroke-width="0.8" opacity="0.3"/>
        <line x1="100" y1="260" x2="300" y2="260" stroke="#8a7a6a" stroke-width="0.8" opacity="0.3"/>
        <line x1="100" y1="280" x2="300" y2="280" stroke="#8a7a6a" stroke-width="0.8" opacity="0.3"/>
        <line x1="100" y1="300" x2="300" y2="300" stroke="#8a7a6a" stroke-width="0.8" opacity="0.3"/>
        <!-- Cuff accent -->
        <line x1="90" y1="320" x2="90" y2="340" stroke="#c9835a" stroke-width="2" opacity="0.7"/>
        <line x1="310" y1="320" x2="310" y2="340" stroke="#c9835a" stroke-width="2" opacity="0.7"/>
        
  </g>
  
  <!-- Label -->
  <text x="200" y="490" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" 
        fill="#8a7a6a" text-anchor="middle" letter-spacing="3" opacity="0.7">KNITWEAR</text>
</svg>