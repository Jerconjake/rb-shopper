<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Thinking About Quitting? — Advanced Solutions Counselling</title>
<meta name="description" content="Free discovery call for smoking cessation with hypnotherapy. No pressure, no commitment — just a conversation.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#2E5A4B;--primary-light:#3A7A64;--accent:#C49A3C;--bg:#FAF8F5;--card:#FFFFFF;--text:#2C2C2C;--text-light:#6B6B6B;--border:#E8E4DF;--user-bg:#2E5A4B;--user-text:#FFFFFF;--ai-bg:#F0EDE8;--ai-text:#2C2C2C}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

.landing-container{display:flex;flex-direction:column;height:100vh;max-width:600px;margin:0 auto}

/* Header */
.landing-header{padding:16px 20px;text-align:center;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0}
.landing-header h1{font-size:15px;font-weight:600;color:var(--primary);letter-spacing:0.3px}
.landing-header p{font-size:12px;color:var(--text-light);margin-top:2px}

/* Trust bar */
.trust-bar{padding:10px 20px;text-align:center;background:var(--primary);flex-shrink:0}
.trust-bar span{font-size:12px;color:rgba(255,255,255,0.9);font-weight:500}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.msg{max-width:85%;padding:12px 16px;border-radius:18px;font-size:14.5px;line-height:1.55;animation:fadeUp .3s ease}
.msg.ai{align-self:flex-start;background:var(--ai-bg);color:var(--ai-text);border-bottom-left-radius:6px}
.msg.user{align-self:flex-end;background:var(--user-bg);color:var(--user-text);border-bottom-right-radius:6px}
.msg a{color:var(--accent);font-weight:600;text-decoration:none}
.msg a:hover{text-decoration:underline}
.typing{align-self:flex-start;background:var(--ai-bg);padding:12px 18px;border-radius:18px;border-bottom-left-radius:6px;display:none}
.typing span{display:inline-block;width:7px;height:7px;background:var(--text-light);border-radius:50%;margin:0 2px;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Input */
.input-area{padding:12px 16px;border-top:1px solid var(--border);background:var(--card);flex-shrink:0;display:flex;gap:10px;align-items:flex-end}
.input-area textarea{flex:1;border:1.5px solid var(--border);border-radius:22px;padding:10px 16px;font-size:15px;font-family:inherit;resize:none;outline:none;max-height:100px;min-height:42px;line-height:1.4;transition:border-color .2s}
.input-area textarea:focus{border-color:var(--primary)}
.input-area button{width:42px;height:42px;border-radius:50%;border:none;background:var(--primary);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.input-area button:hover{background:var(--primary-light)}
.input-area button:disabled{background:var(--border);cursor:not-allowed}
.input-area button svg{width:18px;height:18px}

/* Safe bottom padding for iOS */
.safe-bottom{height:env(safe-area-inset-bottom,0);flex-shrink:0;background:var(--card)}

/* Booking button in messages */
.booking-btn{display:inline-block;margin-top:8px;padding:10px 20px;background:var(--accent);color:white;border-radius:22px;text-decoration:none;font-weight:600;font-size:14px;transition:background .2s}
.booking-btn:hover{background:#B08A30;text-decoration:none}

/* Powered by */
.powered{text-align:center;padding:6px;font-size:10px;color:var(--text-light);background:var(--card);flex-shrink:0}
</style>
</head>
<body>

<div class="landing-container">
  <div class="landing-header">
    <h1>Advanced Solutions Counselling</h1>
    <p>Smoking Cessation Program — Sudbury & Online</p>
  </div>
  <div class="trust-bar">
    <span>✓ Free discovery call · No commitment · 32+ years experience</span>
  </div>
  <div class="messages" id="messages">
    <div class="typing" id="typing"><span></span><span></span><span></span></div>
  </div>
  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Type your message..." autocomplete="off"></textarea>
    <button id="send" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
    </button>
  </div>
  <div class="safe-bottom"></div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const typingEl = document.getElementById('typing');

const LANDING_CONTEXT = "smoking_cessation";
let history = [];
let sending = false;

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});

// Mobile keyboard handling
let origHeight = window.innerHeight;
window.addEventListener('resize', () => {
  if (window.innerHeight < origHeight * 0.75) {
    document.body.style.position = 'fixed';
    document.body.style.width = '100%';
    document.body.style.height = window.innerHeight + 'px';
  } else {
    document.body.style.position = '';
    document.body.style.height = '';
  }
  scrollBottom();
});

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
  div.innerHTML = formatMsg(text);
  messagesEl.insertBefore(div, typingEl);
  scrollBottom();
}

function formatMsg(text) {
  // Convert markdown links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, label, url) => {
    if (url.includes('book-an-appointment')) {
      return `<a href="${url}" target="_blank" class="booking-btn">${label}</a>`;
    }
    return `<a href="${url}" target="_blank">${label}</a>`;
  });
  // Bold
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Line breaks
  text = text.replace(/\n/g, '<br>');
  return text;
}

async function sendMsg() {
  const text = inputEl.value.trim();
  if (!text || sending) return;
  
  sending = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  
  typingEl.style.display = 'block';
  scrollBottom();
  
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, context: LANDING_CONTEXT })
    });
    const data = await resp.json();
    typingEl.style.display = 'none';
    addMsg('ai', data.reply);
    history.push({ role: 'assistant', content: data.reply });
  } catch (e) {
    typingEl.style.display = 'none';
    addMsg('ai', 'I\'m having a little trouble right now. You can reach us directly at 705-410-3810.');
  }
  
  sending = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

sendBtn.addEventListener('click', sendMsg);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// Track session
fetch('/api/session', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ source: 'landing_smoking' }) });
// Track landing source
fetch('/track', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ event: 'landing_view', source: 'smoking' }) });

// Opening message after short delay
setTimeout(() => {
  typingEl.style.display = 'block';
  scrollBottom();
  setTimeout(() => {
    typingEl.style.display = 'none';
    const greeting = "Hey — if you're here, some part of you is thinking about quitting. That takes guts, even if you're not sure yet.\n\nWhat's been on your mind about it?";
    addMsg('ai', greeting);
    history.push({ role: 'assistant', content: greeting });
    inputEl.focus();
  }, 1500);
}, 500);
</script>
</body>
</html>
