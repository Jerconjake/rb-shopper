<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"/>
<title>Arben – TSP Parts Advisor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #e05c00;
    --orange-dark: #b34a00;
    --charcoal: #1c1c1c;
    --dark: #111111;
    --mid: #2a2a2a;
    --light-bg: #f5f5f5;
    --border: #e0e0e0;
    --text: #1c1c1c;
    --muted: #666;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--light-bg);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  #chat-header {
    background: var(--charcoal);
    color: white;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  #chat-header .avatar {
    width: 36px; height: 36px;
    background: var(--orange);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; color: white;
    flex-shrink: 0;
  }
  #chat-header .info { flex: 1; }
  #chat-header .name { font-weight: 700; font-size: 15px; }
  #chat-header .subtitle { font-size: 12px; color: #aaa; margin-top: 1px; }
  #close-btn {
    background: none; border: none; color: #aaa;
    font-size: 22px; cursor: pointer; padding: 4px; line-height: 1;
    display: none;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f5f5f5;
  }
  .msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .msg.arben {
    background: white;
    color: var(--text);
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    border: 1px solid var(--border);
  }
  .msg.user {
    background: var(--orange);
    color: white;
    border-bottom-right-radius: 4px;
    align-self: flex-end;
  }
  .msg a { color: var(--orange); text-decoration: underline; }
  .msg.arben a { color: var(--orange-dark); }
  .msg.user a { color: white; }
  .typing-indicator {
    display: flex; gap: 4px; align-items: center;
    padding: 12px 14px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    width: 56px;
  }
  .typing-indicator span {
    width: 7px; height: 7px;
    background: #bbb; border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-5px); }
  }
  #input-area {
    display: flex;
    gap: 8px;
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    background: white;
    flex-shrink: 0;
  }
  #user-input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 10px 16px;
    font-size: 16px;
    outline: none;
    resize: none;
    font-family: inherit;
    max-height: 100px;
    overflow-y: auto;
  }
  #user-input:focus { border-color: var(--orange); }
  #send-btn {
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 50%;
    width: 42px; height: 42px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  #send-btn:hover { background: var(--orange-dark); }
  #send-btn svg { width: 18px; height: 18px; }

  /* Widget mode */
  body.widget-mode #close-btn { display: block; }

  /* Mobile full-screen */
  @media (max-width: 600px) {
    body { height: 100dvh; }
  }
</style>
</head>
<body>
<div id="chat-header">
  <div class="avatar">A</div>
  <div class="info">
    <div class="name">Arben</div>
    <div class="subtitle">TSP Parts Advisor</div>
  </div>
  <button id="close-btn" onclick="parent.postMessage('sage-close','*')" title="Close">&#10005;</button>
</div>

<div id="messages"></div>

<div id="input-area">
  <textarea id="user-input" placeholder="Ask about parts, equipment, rigs..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
let conversationHistory = [];

// Detect widget mode
if (window.self !== window.top) {
  document.body.classList.add('widget-mode');
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/(https?:\/\/[^\s<]+)/g, (url) => {
      if (text.includes(`](${url})`)) return url;
      return `<a href="${url}" target="_blank" rel="noopener">${url}</a>`;
    })
    .replace(/\n/g, '<br>');
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'arben'}`;
  div.innerHTML = renderMarkdown(text);
  messagesEl.appendChild(div);
  scrollToBottom();
  return div;
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'typing-indicator';
  el.id = 'typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(el);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  showTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });
    const data = await res.json();
    hideTyping();
    const reply = data.reply || "Sorry, something went wrong. Try again.";
    addMessage('arben', reply);
    conversationHistory.push({ role: 'assistant', content: reply });
  } catch (e) {
    hideTyping();
    addMessage('arben', 'Connection error — please try again.');
  }
}

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Greeting
window.addEventListener('message', (e) => {
  if (e.data === '__INIT__') sendGreeting();
});

function sendGreeting() {
  conversationHistory = [];
  messagesEl.innerHTML = '';
  const greeting = "Hey — I'm Arben, TSP's parts advisor. What are you looking for today? Tell me what you're working on and I'll point you in the right direction.";
  addMessage('arben', greeting);
  conversationHistory.push({ role: 'assistant', content: greeting });
}

// Auto-greet if standalone
if (window.self === window.top) {
  sendGreeting();
}
</script>
</body>
</html>
