<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Arben – TSP Parts Advisor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1863DC;
      --blue-dark: #1250B0;
      --blue-light: #EAF0FD;
      --orange: #F2592A;
      --bg: #F4F6FB;
      --white: #FFFFFF;
      --charcoal: #1C2331;
      --muted: #6B7280;
      --border: #D1D9EF;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--charcoal);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-avatar {
      width: 38px; height: 38px;
      background: var(--blue);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: white;
      flex-shrink: 0;
    }
    .header-text { flex: 1; }
    .header-text h1 {
      font-size: 15px; font-weight: 600;
      color: var(--charcoal);
    }
    .header-text p {
      font-size: 12px; color: var(--muted);
      margin-top: 1px;
      display: flex; align-items: center; gap: 5px;
    }
    .online-dot {
      width: 7px; height: 7px;
      background: #22C55E;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    #close-btn {
      background: none; border: none;
      color: var(--muted); font-size: 22px;
      cursor: pointer; padding: 4px; line-height: 1;
      display: none;
    }
    #close-btn:hover { color: var(--charcoal); }
    body.widget-mode #close-btn { display: block; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg { display: flex; gap: 10px; max-width: 100%; }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--blue-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: var(--blue);
      flex-shrink: 0; align-self: flex-end;
    }
    .msg.user .msg-avatar {
      background: var(--blue);
      color: white;
    }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      word-wrap: break-word;
    }
    .msg.arben .bubble {
      background: var(--white);
      color: var(--charcoal);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg.user .bubble {
      background: var(--blue);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bubble a { color: var(--blue); text-decoration: underline; }
    .msg.user .bubble a { color: white; }

    /* Typing */
    .typing-indicator {
      display: flex; gap: 5px; align-items: center;
      padding: 12px 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px; border-bottom-left-radius: 4px;
      align-self: flex-start;
      width: 58px;
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: #BCC5D8; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }

    /* New conversation link */
    #new-convo-bar {
      text-align: center;
      padding: 8px 16px 0;
      flex-shrink: 0;
    }
    #new-convo-bar a {
      font-size: 12px; color: var(--muted);
      text-decoration: none;
      cursor: pointer;
    }
    #new-convo-bar a:hover { color: var(--blue); text-decoration: underline; }

    /* Input */
    #input-area {
      display: flex; gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--white);
      flex-shrink: 0;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 16px;
      outline: none;
      resize: none;
      font-family: inherit;
      max-height: 100px;
      overflow-y: auto;
      line-height: 1.4;
      background: var(--bg);
      color: var(--charcoal);
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: var(--blue); background: white; }
    #user-input::placeholder { color: var(--muted); }
    #send-btn {
      background: var(--blue);
      color: white; border: none;
      border-radius: 50%;
      width: 42px; height: 42px;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }
    #send-btn:hover { background: var(--blue-dark); }
    #send-btn:active { transform: scale(0.94); }
    #send-btn svg { width: 18px; height: 18px; }

    /* Mobile */
    @media (max-width: 480px) {
      body { height: 100dvh; }
      .bubble { max-width: 85%; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-avatar">A</div>
  <div class="header-text">
    <h1>Arben</h1>
    <p><span class="online-dot"></span>TSP Parts Advisor · Always on</p>
  </div>
  <button id="close-btn" onclick="parent.postMessage('arben:close','*')" title="Close">&#10005;</button>
</div>

<div id="new-convo-bar" style="display:none">
  <a onclick="startNewConversation()">↩ Start a new conversation</a>
</div>

<div id="messages"></div>

<div id="input-area">
  <textarea id="user-input" placeholder="Ask about parts, rigs, equipment…" rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()" aria-label="Send">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const newConvoBar = document.getElementById('new-convo-bar');

const STORAGE_KEY = 'arben_tsp_history';
const MAX_STORED = 60;

let conversationHistory = [];

// Widget mode detection
if (window.self !== window.top) {
  document.body.classList.add('widget-mode');
}

// ── Markdown renderer ──────────────────────────────────────────
function renderMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/(https?:\/\/[^\s<"]+)/g, (url) => {
      if (text.includes(`](${url})`)) return url;
      return `<a href="${url}" target="_blank" rel="noopener">${url}</a>`;
    })
    .replace(/\n/g, '<br>');
}

// ── Scroll ─────────────────────────────────────────────────────
function scrollToBottom() {
  requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
}

// ── Add message to UI ──────────────────────────────────────────
function addMessage(role, text, skipSave) {
  const row = document.createElement('div');
  row.className = `msg ${role === 'user' ? 'user' : 'arben'}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? 'U' : 'A';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = renderMarkdown(text);

  row.appendChild(avatar);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scrollToBottom();
  return row;
}

// ── Typing indicator ───────────────────────────────────────────
function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg arben';
  row.id = 'typing-row';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = 'A';
  const ind = document.createElement('div');
  ind.className = 'typing-indicator';
  ind.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(avatar);
  row.appendChild(ind);
  messagesEl.appendChild(row);
  scrollToBottom();
}
function hideTyping() {
  const el = document.getElementById('typing-row');
  if (el) el.remove();
}

// ── LocalStorage persistence ───────────────────────────────────
function saveHistory() {
  try {
    const payload = { messages: conversationHistory.slice(-MAX_STORED) };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  } catch(e) {}
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function clearHistory() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

// ── Greeting ───────────────────────────────────────────────────
const GREETING = "Hey — I'm Arben, TSP's parts advisor. What are you working on? Tell me what you need and I'll point you in the right direction.";

function startGreeting() {
  clearHistory();
  messagesEl.innerHTML = '';
  newConvoBar.style.display = 'none';
  conversationHistory = [];
  addMessage('arben', GREETING);
  conversationHistory.push({ role: 'assistant', content: GREETING });
  saveHistory();
}

function startNewConversation() {
  startGreeting();
}

// ── Restore or greet ───────────────────────────────────────────
function init() {
  const saved = loadHistory();
  if (saved && saved.messages && saved.messages.length > 1) {
    conversationHistory = saved.messages;
    // Replay UI
    conversationHistory.forEach(m => addMessage(m.role, m.content, true));
    newConvoBar.style.display = 'block';
  } else {
    startGreeting();
  }
}

// ── Send message ───────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  saveHistory();

  showTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });
    const data = await res.json();
    hideTyping();
    const reply = data.reply || 'Sorry, something went wrong. Try again.';
    addMessage('arben', reply);
    conversationHistory.push({ role: 'assistant', content: reply });
    saveHistory();
    newConvoBar.style.display = 'block';
  } catch(e) {
    hideTyping();
    addMessage('arben', 'Connection error — please try again.');
  }
}

// ── Auto-resize textarea ───────────────────────────────────────
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ── Init ───────────────────────────────────────────────────────
init();
</script>
</body>
</html>
