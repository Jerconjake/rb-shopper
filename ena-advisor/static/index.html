<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Nora — Nurse Relief Inc.</title>
<style>
  :root {
    --blue: #1B6CA8;
    --blue-dark: #145486;
    --blue-light: #E8F2FA;
    --blue-mid: #D0E8F5;
    --text: #1A2332;
    --muted: #6B7C93;
    --border: #D5E5F0;
    --white: #FFFFFF;
    --green: #2ECC71;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #F0F6FB;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  #header {
    background: var(--blue);
    color: white;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(27,108,168,0.3);
  }
  #avatar {
    width: 40px; height: 40px;
    background: var(--blue-dark);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.3);
  }
  #header-text h1 { font-size: 16px; font-weight: 700; }
  #header-text p { font-size: 12px; opacity: 0.85; display: flex; align-items: center; gap: 5px; }
  .online-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; display: inline-block; }

  /* New conversation link */
  #new-convo-bar {
    display: none;
    background: var(--blue-light);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    text-align: center;
    font-size: 12px;
    color: var(--blue);
    flex-shrink: 0;
  }
  #new-convo-bar a { color: var(--blue); text-decoration: underline; cursor: pointer; font-weight: 600; }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .msg { display: flex; gap: 8px; max-width: 88%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.bot .bubble {
    background: var(--white);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.user .bubble {
    background: var(--blue);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg-avatar {
    width: 28px; height: 28px;
    background: var(--blue);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    align-self: flex-end;
  }

  /* Typing indicator */
  .typing .bubble {
    display: flex; align-items: center; gap: 4px;
    padding: 12px 16px;
  }
  .dot {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* Input area */
  #input-area {
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #user-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 22px;
    padding: 10px 16px;
    font-size: 14px;
    outline: none;
    resize: none;
    max-height: 120px;
    font-family: inherit;
    color: var(--text);
    background: #FAFCFF;
    transition: border-color 0.2s;
    line-height: 1.4;
  }
  #user-input:focus { border-color: var(--blue); }
  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 40px; height: 40px;
    background: var(--blue);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  #send-btn:hover { background: var(--blue-dark); }
  #send-btn:active { transform: scale(0.93); }
  #send-btn svg { width: 18px; height: 18px; fill: white; }

  /* Scrollbar */
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Links inside bubbles */
  .bubble a { color: var(--blue); text-decoration: underline; }
  .msg.user .bubble a { color: rgba(255,255,255,0.9); }
</style>
</head>
<body>

<div id="header">
  <div id="avatar">🩺</div>
  <div id="header-text">
    <h1>Nora</h1>
    <p><span class="online-dot"></span> Nurse Relief Inc. — Always on</p>
  </div>
</div>

<div id="new-convo-bar">
  Continuing a previous conversation. <a id="new-convo-link">↩ Start a new conversation</a>
</div>

<div id="messages"></div>

<div id="input-area">
  <textarea id="user-input" placeholder="Type a message…" rows="1"></textarea>
  <button id="send-btn" aria-label="Send">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

<script>
const STORAGE_KEY = 'nora_history_v1';
const MAX_HISTORY = 60;
const GREETING = "Hi there! 👋 I'm Nora, your virtual assistant for Nurse Relief Inc.\n\nI can help whether you're a nursing professional interested in joining our team, or a healthcare facility looking for staffing support.\n\nWhich best describes you?";

let history = [];

function saveHistory() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(-MAX_HISTORY)));
}

function loadHistory() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : [];
  } catch { return []; }
}

function addMessage(role, content, save = true) {
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;

  const avatarDiv = role === 'assistant' ? `<div class="msg-avatar">🩺</div>` : '';
  div.innerHTML = `
    ${role === 'assistant' ? avatarDiv : ''}
    <div class="bubble">${linkify(escapeHtml(content))}</div>
    ${role === 'user' ? '' : ''}
  `;
  document.getElementById('messages').appendChild(div);
  scrollToBottom();

  if (save) {
    history.push({ role, content });
    saveHistory();
  }
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function linkify(text) {
  return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-avatar">🩺</div><div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  document.getElementById('messages').appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function scrollToBottom(force = false) {
  const msgs = document.getElementById('messages');
  const nearBottom = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 100;
  if (nearBottom || force) msgs.scrollTop = msgs.scrollHeight;
}

async function sendMessage(text) {
  if (!text.trim()) return;
  addMessage('user', text);
  document.getElementById('user-input').value = '';
  autoResize();
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    hideTyping();
    addMessage('assistant', data.reply);
  } catch (e) {
    hideTyping();
    addMessage('assistant', 'Sorry, I had a connection issue. Please try again or call us at (780) 477-0610.');
  }
}

function autoResize() {
  const ta = document.getElementById('user-input');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

// Init
window.addEventListener('DOMContentLoaded', () => {
  const saved = loadHistory();
  const newConvoBar = document.getElementById('new-convo-bar');
  const newConvoLink = document.getElementById('new-convo-link');

  if (saved.length > 0) {
    history = saved;
    newConvoBar.style.display = 'block';
    saved.forEach(m => addMessage(m.role, m.content, false));
  } else {
    addMessage('assistant', GREETING, false);
    history = [{ role: 'assistant', content: GREETING }];
    saveHistory();
  }

  newConvoLink.addEventListener('click', () => {
    history = [];
    localStorage.removeItem(STORAGE_KEY);
    document.getElementById('messages').innerHTML = '';
    newConvoBar.style.display = 'none';
    addMessage('assistant', GREETING, false);
    history = [{ role: 'assistant', content: GREETING }];
    saveHistory();
  });

  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  input.addEventListener('input', autoResize);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input.value);
    }
  });
  sendBtn.addEventListener('click', () => sendMessage(input.value));
});
</script>
</body>
</html>
