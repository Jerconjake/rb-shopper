<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sage — Desert Willow Botanicals Wellness Advisor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand: #F5F0E8;
      --sand-dark: #EDE6D6;
      --sage: #7A9E7E;
      --sage-dark: #5C7D60;
      --sage-light: #EAF2EB;
      --terra: #C4773B;
      --terra-light: #FAF0E6;
      --charcoal: #2C2C2C;
      --muted: #6B6B6B;
      --white: #FFFFFF;
      --border: #DDD5C4;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--sand);
      color: var(--charcoal);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-avatar {
      width: 40px;
      height: 40px;
      background: var(--sage);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
    }
    .header-info h1 {
      font-family: 'Lora', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--charcoal);
    }
    .header-info p {
      font-size: 12px;
      color: var(--muted);
    }
    .header-logo {
      margin-left: auto;
      font-family: 'Lora', serif;
      font-size: 13px;
      color: var(--sage-dark);
      font-style: italic;
    }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* MESSAGES */
    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message.assistant {
      align-self: flex-start;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .message.assistant .msg-avatar {
      background: var(--sage);
      color: white;
    }
    .message.user .msg-avatar {
      background: var(--sand-dark);
      color: var(--charcoal);
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.55;
    }
    .message.assistant .msg-bubble {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      color: var(--charcoal);
    }
    .message.user .msg-bubble {
      background: var(--sage);
      color: white;
      border-radius: 16px 4px 16px 16px;
    }

    /* PRODUCT CARDS */
    .product-cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }
    .product-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      gap: 12px;
      padding: 12px;
      transition: box-shadow 0.2s;
    }
    .product-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .product-card img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .product-card-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .product-card-name {
      font-family: 'Lora', serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--charcoal);
    }
    .product-card-tagline {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }
    .product-card-price {
      font-size: 13px;
      font-weight: 600;
      color: var(--terra);
      margin-top: 2px;
    }
    .product-card-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .btn-buy {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-buy-primary {
      background: var(--sage);
      color: white;
    }
    .btn-buy-primary:hover { background: var(--sage-dark); }
    .btn-buy-sub {
      background: var(--terra-light);
      color: var(--terra);
      border: 1px solid var(--terra);
    }
    .btn-buy-sub:hover { background: var(--terra); color: white; }

    /* SUGGESTION CHIPS */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 4px;
    }
    .chip {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 13px;
      color: var(--sage-dark);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .chip:hover {
      background: var(--sage-light);
      border-color: var(--sage);
    }

    /* TYPING INDICATOR */
    .typing {
      display: flex;
      gap: 4px;
      padding: 14px 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      width: fit-content;
    }
    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--sage);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* INPUT */
    .input-area {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      resize: none;
      outline: none;
      max-height: 120px;
      background: var(--sand);
      color: var(--charcoal);
      line-height: 1.5;
    }
    textarea:focus { border-color: var(--sage); background: var(--white); }
    textarea::placeholder { color: #AAA; }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--sage);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .send-btn:hover { background: var(--sage-dark); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }

    /* WELCOME */
    .welcome {
      text-align: center;
      padding: 32px 24px 16px;
    }
    .welcome-icon {
      width: 64px;
      height: 64px;
      background: var(--sage);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 16px;
    }
    .welcome h2 {
      font-family: 'Lora', serif;
      font-size: 22px;
      color: var(--charcoal);
      margin-bottom: 8px;
    }
    .welcome p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto;
    }

    /* DISCLAIMER */
    .disclaimer {
      font-size: 11px;
      color: #AAA;
      text-align: center;
      padding: 0 16px 8px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
