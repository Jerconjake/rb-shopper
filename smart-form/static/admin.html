<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SmartForm Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}

.pin-gate{display:flex;align-items:center;justify-content:center;min-height:100vh}
.pin-card{background:#1e293b;border-radius:16px;padding:40px;width:320px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.pin-card h1{font-size:20px;font-weight:700;margin-bottom:6px;color:#fff}
.pin-card p{font-size:13px;color:#94a3b8;margin-bottom:20px}
.pin-input{width:100%;padding:12px;border:2px solid #334155;border-radius:10px;background:#0f172a;
  color:#fff;font-size:18px;text-align:center;letter-spacing:8px;outline:none}
.pin-input:focus{border-color:#3b82f6}
.pin-input.error{border-color:#ef4444;animation:shake .4s ease}
.pin-btn{width:100%;padding:12px;background:#3b82f6;color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:600;cursor:pointer;margin-top:14px}
.pin-btn:hover{background:#2563eb}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

.admin{display:none;max-width:900px;margin:0 auto;padding:24px 20px 60px}
.admin.active{display:block}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.admin-header h1{font-size:22px;font-weight:800;color:#fff}
.add-btn{padding:10px 18px;background:#3b82f6;color:#fff;border:none;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer}
.add-btn:hover{background:#2563eb}

.clients-grid{display:grid;gap:16px}
.client-card{background:#1e293b;border-radius:12px;overflow:hidden;border:1px solid #334155;
  transition:border-color .2s}
.client-card:hover{border-color:#475569}
.client-card-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;gap:12px}
.client-card-header h3{font-size:15px;font-weight:700;color:#fff;flex:1}
.client-badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.badge-demo{background:#fef3c7;color:#92400e}
.badge-ghl{background:#ecfdf5;color:#065f46}
.badge-qa{background:#eff6ff;color:#1e40af}
.badge-dash{background:#f3e8ff;color:#6b21a8}
.client-id{font-size:12px;color:#64748b;font-family:monospace}
.expand-icon{color:#64748b;transition:transform .2s;flex-shrink:0}
.expand-icon.open{transform:rotate(180deg)}

.client-body{display:none;padding:0 20px 20px;border-top:1px solid #334155}
.client-body.open{display:block}

.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #334155;padding-top:16px}
.tab{padding:10px 16px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab:hover{color:#e2e8f0}
.tab.active{color:#3b82f6;border-bottom-color:#3b82f6}

.tab-content{display:none}
.tab-content.active{display:block}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid.full{grid-template-columns:1fr}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.fg{margin-bottom:0}
.fg label{display:block;font-size:11px;font-weight:700;color:#94a3b8;margin-bottom:4px;
  text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 12px;border:1.5px solid #334155;
  border-radius:8px;background:#0f172a;color:#e2e8f0;font-size:13px;font-family:inherit;outline:none}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:#3b82f6}
.fg textarea{resize:vertical;min-height:80px}
.fg .hint{font-size:11px;color:#64748b;margin-top:3px}
.fg-check{display:flex;align-items:center;gap:8px;padding:8px 0}
.fg-check input[type="checkbox"]{width:18px;height:18px;accent-color:#3b82f6}
.fg-check label{font-size:13px;color:#e2e8f0;margin-bottom:0;text-transform:none;letter-spacing:0}

.color-preview{display:inline-block;width:20px;height:20px;border-radius:4px;border:2px solid #475569;
  vertical-align:middle;margin-left:8px}

.section-title{font-size:12px;font-weight:700;color:#3b82f6;text-transform:uppercase;
  letter-spacing:.5px;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid #334155}
.section-title:first-child{margin-top:0}

.save-row{display:flex;gap:10px;margin-top:18px;padding-top:16px;border-top:1px solid #334155}
.save-btn{padding:10px 20px;background:#3b82f6;color:#fff;border:none;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
.save-btn:hover{background:#2563eb}
.delete-btn{padding:10px 20px;background:#dc2626;color:#fff;border:none;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;margin-left:auto}
.delete-btn:hover{background:#b91c1c}
.save-status{font-size:12px;color:#10b981;align-self:center}

.embed-code{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:14px;
  font-family:'Courier New',monospace;font-size:12px;color:#94a3b8;line-height:1.6;
  overflow-x:auto;white-space:pre-wrap;word-break:break-all;position:relative}
.copy-btn{position:absolute;top:8px;right:8px;padding:5px 10px;background:#334155;color:#e2e8f0;
  border:none;border-radius:5px;font-size:11px;cursor:pointer}
.copy-btn:hover{background:#475569}
</style>
</head>
<body>

<div class="pin-gate" id="pinGate">
  <div class="pin-card">
    <h1>SmartForm Admin</h1>
    <p>Enter admin PIN</p>
    <input type="password" class="pin-input" id="pinInput" placeholder="••••" maxlength="10" autofocus>
    <button class="pin-btn" id="pinBtn">Enter</button>
  </div>
</div>

<div class="admin" id="admin">
  <div class="admin-header">
    <h1>SmartForm Admin</h1>
    <button class="add-btn" id="addBtn">+ Add Client</button>
  </div>
  <div class="clients-grid" id="clientsGrid"></div>
</div>

<script>
(function(){
  var BASE = window.location.origin;
  var clients = [];
  var PIN = '';
  var $ = function(id){ return document.getElementById(id); };

  // PIN
  $('pinBtn').addEventListener('click', async function(){
    PIN = $('pinInput').value.trim();
    if(!PIN) return;
    this.disabled=true; this.textContent='Checking...';
    try {
      var r = await fetch(BASE+'/admin/api/clients',{headers:{'X-Admin-Pin':PIN}});
      if(r.status===403){ $('pinInput').classList.add('error'); setTimeout(function(){$('pinInput').classList.remove('error');},500); this.disabled=false; this.textContent='Enter'; $('pinInput').value=''; return; }
      clients = await r.json();
      $('pinGate').style.display='none';
      $('admin').classList.add('active');
      renderClients();
    } catch(e){ this.disabled=false; this.textContent='Enter'; }
  });
  $('pinInput').addEventListener('keydown',function(e){ if(e.key==='Enter') $('pinBtn').click(); });

  function renderClients(){
    $('clientsGrid').innerHTML = clients.map(function(c, i){
      var badges = '';
      if(c.demo_mode) badges += '<span class="badge badge-demo">DEMO</span>';
      if(c.ghl_api_token) badges += '<span class="badge badge-ghl">GHL</span>';
      if(c.knowledge_base) badges += '<span class="badge badge-qa">💬 AI Q&A</span>';
      if(c.dashboard_pin) badges += '<span class="badge badge-dash">📊 Dashboard</span>';
      return '<div class="client-card" data-idx="'+i+'">\
        <div class="client-card-header" onclick="window._sfToggle('+i+')">\
          <div><h3>'+esc(c.business_name||c.id)+'</h3><div class="client-id">'+esc(c.id)+'</div></div>\
          <div class="client-badges">'+badges+'</div>\
          <svg class="expand-icon" id="arrow'+i+'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>\
        </div>\
        <div class="client-body" id="body'+i+'">'+renderClientForm(c, i)+'</div>\
      </div>';
    }).join('');
  }

  window._sfToggle = function(i){
    var body = $('body'+i);
    var arrow = $('arrow'+i);
    body.classList.toggle('open');
    arrow.classList.toggle('open');
  };

  function renderClientForm(c, i){
    var host = window.location.origin;
    return '<div class="tabs">\
      <div class="tab active" onclick="window._sfTab('+i+',0,this)">Configuration</div>\
      <div class="tab" onclick="window._sfTab('+i+',1,this)">GHL Integration</div>\
      <div class="tab" onclick="window._sfTab('+i+',2,this)">Tracking & Ads</div>\
      <div class="tab" onclick="window._sfTab('+i+',3,this)">Embed Code</div>\
      <div class="tab" onclick="window._sfTab('+i+',4,this)">Links</div>\
    </div>\
    \
    <div class="tab-content active" id="tc'+i+'_0">\
      <div class="form-grid">\
        <div class="fg"><label>Client ID</label><input value="'+esc(c.id)+'" disabled></div>\
        <div class="fg"><label>Business Name</label><input id="f'+i+'_name" value="'+esc(c.business_name||'')+'"></div>\
        <div class="fg"><label>Owner Email</label><input id="f'+i+'_email" value="'+esc(c.notification_email||'')+'"></div>\
        <div class="fg"><label>Brand Color (hex)</label><input id="f'+i+'_color" value="'+esc(c.brand_color||'#2563eb')+'" maxlength="7" placeholder="#2563eb">\
          <span class="color-preview" id="cp'+i+'" style="background:'+esc(c.brand_color||'#2563eb')+'"></span></div>\
        <div class="fg"><label>Dashboard PIN</label><input id="f'+i+'_dashpin" value="'+esc(c.dashboard_pin||'')+'" placeholder="Client accesses /dashboard/'+esc(c.id)+'">\
          <div class="hint">PIN for client-facing leads dashboard</div></div>\
        <div class="fg"><label>Thank You URL</label><input id="f'+i+'_tyurl" value="'+esc(c.thank_you_url||'')+'" placeholder="https://..."></div>\
      </div>\
      <div class="fg-check"><input type="checkbox" id="f'+i+'_tywidget" '+(c.thank_you_widget?'checked':'')+'><label for="f'+i+'_tywidget">Auto-open widget on thank you page (continuation chat)</label></div>\
      <div class="fg-check"><input type="checkbox" id="f'+i+'_demo" '+(c.demo_mode?'checked':'')+'><label for="f'+i+'_demo">Demo mode (no real emails or GHL pushes)</label></div>\
      <div class="section-title">AI Configuration</div>\
      <div class="form-grid full">\
        <div class="fg"><label>Services Description</label><textarea id="f'+i+'_services" rows="3" placeholder="Describe what this business does...">'+esc(c.business_description||'')+'</textarea></div>\
        <div class="fg"><label>Knowledge Base (for Q&A Assistant)</label><textarea id="f'+i+'_kb" rows="4" placeholder="FAQ content, service details...">'+esc(c.knowledge_base||'')+'</textarea>\
          <div class="hint">If filled in, "Ask our AI assistant" link appears below the form</div></div>\
      </div>\
      <div class="save-row"><button class="save-btn" onclick="window._sfSave('+i+')">Save Changes</button><span class="save-status" id="status'+i+'"></span>\
        <button class="delete-btn" onclick="window._sfDelete('+i+')">Delete</button></div>\
    </div>\
    \
    <div class="tab-content" id="tc'+i+'_1">\
      <div class="section-title">GoHighLevel Integration</div>\
      <div class="form-grid">\
        <div class="fg"><label>GHL Private Integration Token</label><input id="f'+i+'_ghl_token" value="'+esc(c.ghl_api_token||'')+'" placeholder="pit-..."></div>\
        <div class="fg"><label>GHL Location ID</label><input id="f'+i+'_ghl_loc" value="'+esc(c.ghl_location_id||'')+'" placeholder="e.g. pmUzbb..."></div>\
        <div class="fg"><label>GHL Tag</label><input id="f'+i+'_ghl_tag" value="'+esc(c.ghl_tag||'SmartForm Lead')+'" placeholder="SmartForm Lead">\
          <div class="hint">Tag applied to contacts in GHL — triggers automation</div></div>\
      </div>\
      <div class="save-row"><button class="save-btn" onclick="window._sfSave('+i+')">Save Changes</button><span class="save-status" id="status_ghl'+i+'"></span></div>\
    </div>\
    \
    <div class="tab-content" id="tc'+i+'_2">\
      <div class="section-title">Facebook Pixel</div>\
      <div class="form-grid">\
        <div class="fg"><label>Facebook Pixel ID</label><input id="f'+i+'_pixel" value="'+esc(c.facebook_pixel_id||'')+'" placeholder="e.g. 123456789"></div>\
      </div>\
      <div class="section-title">Google Ads</div>\
      <div class="form-grid">\
        <div class="fg"><label>Google Ads Conversion ID</label><input id="f'+i+'_gads" value="'+esc(c.google_ads_id||'')+'" placeholder="AW-123456789"></div>\
        <div class="fg"><label>Google Ads Conversion Label</label><input id="f'+i+'_gadsl" value="'+esc(c.google_ads_label||'')+'" placeholder="AbCdEf..."></div>\
      </div>\
      <div class="save-row"><button class="save-btn" onclick="window._sfSave('+i+')">Save Changes</button><span class="save-status" id="status_track'+i+'"></span></div>\
    </div>\
    \
    <div class="tab-content" id="tc'+i+'_3">\
      <div class="section-title">Inline Form (replaces contact form)</div>\
      <div class="embed-code" id="embed_inline'+i+'"><button class="copy-btn" onclick="window._sfCopy(\'embed_inline'+i+'\')">Copy</button>&lt;div data-smartform="inline"&gt;&lt;/div&gt;\n&lt;script src="'+host+'/embed.js?id='+esc(c.id)+'"&gt;&lt;/script&gt;</div>\
      <div class="section-title" style="margin-top:20px">Floating Widget (all pages)</div>\
      <div class="embed-code" id="embed_widget'+i+'"><button class="copy-btn" onclick="window._sfCopy(\'embed_widget'+i+'\')">Copy</button>&lt;script src="'+host+'/embed.js?id='+esc(c.id)+'"&gt;&lt;/script&gt;</div>\
      '+(c.thank_you_widget?'<div class="section-title" style="margin-top:20px">Thank You Page Widget</div>\
      <div class="embed-code" id="embed_ty'+i+'"><button class="copy-btn" onclick="window._sfCopy(\'embed_ty'+i+'\')">Copy</button>&lt;!-- Place on your thank you page --&gt;\n&lt;script src="'+host+'/embed.js?id='+esc(c.id)+'"&gt;&lt;/script&gt;\n&lt;!-- Widget auto-opens with continuation chat --&gt;</div>':'')+'\
    </div>\
    \
    <div class="tab-content" id="tc'+i+'_4">\
      <div class="section-title">Quick Links</div>\
      <div style="display:flex;flex-direction:column;gap:10px">\
        <a href="'+host+'/form/'+esc(c.id)+'" target="_blank" style="color:#3b82f6;font-size:13px">📝 Standalone Form</a>\
        <a href="'+host+'/landing/'+esc(c.id)+'" target="_blank" style="color:#3b82f6;font-size:13px">🚀 Landing Page</a>\
        '+(c.dashboard_pin?'<a href="'+host+'/dashboard/'+esc(c.id)+'" target="_blank" style="color:#3b82f6;font-size:13px">📊 Client Dashboard (PIN: '+esc(c.dashboard_pin)+')</a>':'')+'\
      </div>\
    </div>';
  }

  window._sfTab = function(i, t, el){
    el.parentElement.querySelectorAll('.tab').forEach(function(tab){ tab.classList.remove('active'); });
    el.classList.add('active');
    for(var j=0;j<5;j++){
      var tc = document.getElementById('tc'+i+'_'+j);
      if(tc) tc.classList.toggle('active', j===t);
    }
  };

  window._sfSave = async function(i){
    var c = clients[i];
    var data = {
      id: c.id,
      business_name: $('f'+i+'_name').value.trim(),
      notification_email: $('f'+i+'_email').value.trim(),
      brand_color: $('f'+i+'_color').value.trim(),
      business_description: $('f'+i+'_services').value.trim(),
      knowledge_base: $('f'+i+'_kb').value.trim(),
      thank_you_url: $('f'+i+'_tyurl').value.trim(),
      demo_mode: $('f'+i+'_demo').checked,
      dashboard_pin: $('f'+i+'_dashpin').value.trim(),
      facebook_pixel_id: $('f'+i+'_pixel').value.trim(),
      google_ads_id: $('f'+i+'_gads').value.trim(),
      google_ads_label: $('f'+i+'_gadsl').value.trim(),
      ghl_api_token: $('f'+i+'_ghl_token').value.trim(),
      ghl_location_id: $('f'+i+'_ghl_loc').value.trim(),
      ghl_tag: $('f'+i+'_ghl_tag').value.trim(),
    };
    try {
      var r = await fetch(BASE+'/admin/api/clients',{
        method:'POST',headers:{'Content-Type':'application/json','X-Admin-Pin':PIN},
        body:JSON.stringify(data)
      });
      if(r.ok){
        var updated = await r.json();
        clients[i] = Object.assign(clients[i], updated);
        showStatus(i, '✓ Saved');
      } else { showStatus(i, '✗ Error'); }
    } catch(e){ showStatus(i, '✗ Error'); }
  };

  window._sfDelete = async function(i){
    if(!confirm('Delete client "'+clients[i].id+'"? This cannot be undone.')) return;
    try {
      await fetch(BASE+'/admin/api/clients/'+clients[i].id,{method:'DELETE',headers:{'X-Admin-Pin':PIN}});
      clients.splice(i, 1);
      renderClients();
    } catch(e){}
  };

  function showStatus(i, msg){
    var els = [document.getElementById('status'+i), document.getElementById('status_ghl'+i), document.getElementById('status_track'+i)];
    els.forEach(function(el){ if(el){ el.textContent = msg; setTimeout(function(){ el.textContent=''; }, 3000); }});
  }

  window._sfCopy = function(id){
    var el = document.getElementById(id);
    var text = el.textContent.replace('Copy','').trim();
    navigator.clipboard.writeText(text);
    var btn = el.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(function(){ btn.textContent = 'Copy'; }, 2000);
  };

  // Color preview live update
  document.addEventListener('input', function(e){
    if(e.target.id && e.target.id.match(/^f\d+_color$/)){
      var idx = e.target.id.match(/\d+/)[0];
      var cp = document.getElementById('cp'+idx);
      if(cp && /^#[0-9a-fA-F]{6}$/.test(e.target.value)) cp.style.background = e.target.value;
    }
  });

  // Add client
  $('addBtn').addEventListener('click', async function(){
    var id = prompt('Client ID (lowercase, no spaces):');
    if(!id) return;
    id = id.toLowerCase().replace(/[^a-z0-9_-]/g, '');
    if(!id) return;
    try {
      var r = await fetch(BASE+'/admin/api/clients',{
        method:'POST',headers:{'Content-Type':'application/json','X-Admin-Pin':PIN},
        body:JSON.stringify({id:id, business_name:id})
      });
      if(r.ok){
        var newClient = await r.json();
        clients.push(newClient);
        renderClients();
      } else {
        var err = await r.json();
        alert(err.error || 'Failed to create client');
      }
    } catch(e){ alert('Error creating client'); }
  });

  function esc(s){ if(!s) return ''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
})();
</script>
</body>
</html>
