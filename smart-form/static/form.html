<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Contact</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#2563eb;--brand-hover:#1d4ed8;--brand-10:rgba(37,99,235,.1);
  --bg:#ffffff;--card:#ffffff;--text:#0f172a;--text-2:#64748b;--text-3:#94a3b8;
  --border:#e2e8f0;--input-bg:#f8fafc;--success:#10b981;--success-bg:#ecfdf5;
  --radius:12px;--radius-sm:10px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --transition:.3s cubic-bezier(.4,0,.2,1);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif;
  color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}

/* Landing mode: centered card on gray bg */
body.landing{background:#f1f5f9;display:flex;align-items:center;justify-content:center;padding:24px}
body.landing .card{box-shadow:var(--shadow);border-radius:16px;max-width:460px;width:100%}

/* Inline/widget mode: no shadow, fills container */
body:not(.landing) .card{max-width:100%;border-radius:0}

.card{background:var(--card);overflow:hidden;position:relative}

/* ---- FORM STATE ---- */
.form-section{padding:32px 28px 28px;transition:opacity .35s ease,transform .35s ease}
.form-section.hidden{opacity:0;transform:translateY(-16px);pointer-events:none;position:absolute;width:100%}
.form-section h1{font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.form-section p.subtitle{font-size:14px;color:var(--text-2);margin-bottom:28px}

.field{margin-bottom:20px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.field input,.field textarea{
  width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg);font-size:15px;font-family:inherit;color:var(--text);
  transition:border-color var(--transition),box-shadow var(--transition);outline:none;resize:none}
.field input:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-10)}
.field input::placeholder,.field textarea::placeholder{color:var(--text-3)}
.field textarea{min-height:100px;line-height:1.5}

.btn-submit{
  width:100%;padding:15px;border:none;border-radius:var(--radius-sm);
  background:var(--brand);color:#fff;font-size:15px;font-weight:600;
  cursor:pointer;transition:all var(--transition);display:flex;align-items:center;justify-content:center;gap:8px}
.btn-submit:hover:not(:disabled){background:var(--brand-hover);transform:translateY(-1px);
  box-shadow:0 4px 14px rgba(37,99,235,.25)}
.btn-submit:active:not(:disabled){transform:translateY(0)}
.btn-submit:disabled{opacity:.7;cursor:not-allowed}

.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-submit.loading .spinner{display:block}
.btn-submit.loading .btn-text{display:none}

/* ---- CHAT STATE ---- */
.chat-section{display:none;flex-direction:column;height:100%}
.chat-section.active{display:flex}

.contact-bar{padding:14px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;
  animation:fadeSlideIn .35s ease}
.contact-bar .check{width:20px;height:20px;border-radius:50%;background:var(--success);
  display:flex;align-items:center;justify-content:center}
.contact-bar .check svg{width:12px;height:12px}
.contact-bar .info{font-size:13px;color:var(--text-2)}
.contact-bar .info strong{color:var(--text);font-weight:600}

.messages{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:82%;padding:12px 16px;font-size:14px;line-height:1.55;animation:fadeSlideIn .3s ease;word-wrap:break-word}
.msg-user{align-self:flex-end;background:var(--brand);color:#fff;border-radius:16px 16px 4px 16px}
.msg-ai{align-self:flex-start;background:var(--input-bg);color:var(--text);border-radius:16px 16px 16px 4px;
  border:1px solid var(--border)}

.typing{align-self:flex-start;padding:14px 18px;background:var(--input-bg);border-radius:16px;
  display:flex;gap:5px;animation:fadeSlideIn .2s ease;border:1px solid var(--border)}
.typing span{width:7px;height:7px;background:var(--text-3);border-radius:50%;
  animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

.chat-input{padding:16px 28px;border-top:1px solid var(--border);display:flex;gap:10px;
  background:var(--bg);animation:fadeSlideIn .35s ease .15s both}
.chat-input input{flex:1;padding:12px 16px;border:1.5px solid var(--border);border-radius:24px;
  font-size:14px;font-family:inherit;outline:none;transition:border-color var(--transition),box-shadow var(--transition)}
.chat-input input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-10)}
.chat-input button{width:42px;height:42px;border:none;border-radius:50%;background:var(--brand);
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);flex-shrink:0}
.chat-input button:hover{background:var(--brand-hover);transform:scale(1.05)}
.chat-input button svg{width:18px;height:18px}
.chat-input.disabled{pointer-events:none;opacity:.5}

/* ---- SUCCESS STATE ---- */
.success-section{display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 28px;text-align:center}
.success-section.active{display:flex}
.success-icon{width:64px;height:64px;border-radius:50%;background:var(--success-bg);
  display:flex;align-items:center;justify-content:center;margin-bottom:20px;
  animation:scaleIn .4s cubic-bezier(.175,.885,.32,1.275)}
.success-icon svg{width:32px;height:32px;color:var(--success)}
.success-section h2{font-size:20px;font-weight:700;margin-bottom:6px}
.success-section p{font-size:14px;color:var(--text-2)}

/* ---- END STATE (solicitor/job) ---- */
.end-section{display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 28px;text-align:center}
.end-section.active{display:flex}
.end-section .end-icon{width:56px;height:56px;border-radius:50%;background:var(--input-bg);
  display:flex;align-items:center;justify-content:center;margin-bottom:16px;
  animation:scaleIn .4s cubic-bezier(.175,.885,.32,1.275)}
.end-section h2{font-size:18px;font-weight:600;margin-bottom:6px}
.end-section p{font-size:14px;color:var(--text-2);line-height:1.5}

@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{transform:scale(0)}to{transform:scale(1)}}

/* ---- DEMO MODE ---- */
.demo-banner{display:none;padding:8px 28px;background:#fef3c7;color:#92400e;font-size:12px;font-weight:600;
  text-align:center;letter-spacing:.3px;text-transform:uppercase;border-bottom:1px solid #fde68a}
body.demo-mode .demo-banner{display:block}

.demo-reveal{display:none;margin:12px 28px 16px;border-radius:12px;overflow:hidden;
  animation:demoSlideIn .5s cubic-bezier(.4,0,.2,1);border:1px solid #e2e8f0;background:#ffffff}
.demo-reveal.active{display:block}

@keyframes demoSlideIn{from{opacity:0;transform:translateY(12px);max-height:0}
  to{opacity:1;transform:translateY(0);max-height:500px}}

.demo-reveal-header{padding:14px 18px;background:linear-gradient(135deg,#1e293b,#334155);
  display:flex;align-items:center;gap:10px}
.demo-reveal-header .demo-eye{width:28px;height:28px;border-radius:8px;
  background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center}
.demo-reveal-header .demo-eye svg{width:16px;height:16px}
.demo-reveal-header .demo-title{font-size:13px;font-weight:700;color:#fff;letter-spacing:.3px}
.demo-reveal-header .demo-subtitle{font-size:11px;color:#94a3b8;margin-top:1px}

.demo-reveal-body{padding:16px 18px}

.demo-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.demo-row:last-child{border-bottom:none}
.demo-row-label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;
  letter-spacing:.4px;min-width:90px;padding-top:2px}
.demo-row-value{font-size:14px;color:#0f172a;line-height:1.4;flex:1}

.demo-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;
  font-size:12px;font-weight:600;letter-spacing:.2px}
.demo-badge.qualified{background:#ecfdf5;color:#065f46}
.demo-badge.clarification{background:#eff6ff;color:#1e40af}
.demo-badge.solicitor{background:#fef3c7;color:#92400e}
.demo-badge.job{background:#f3e8ff;color:#6b21a8}
.demo-badge.mismatch{background:#fef2f2;color:#991b1b}
.demo-badge .badge-dot{width:7px;height:7px;border-radius:50%}
.demo-badge.qualified .badge-dot{background:#10b981}
.demo-badge.clarification .badge-dot{background:#3b82f6}
.demo-badge.solicitor .badge-dot{background:#f59e0b}
.demo-badge.job .badge-dot{background:#a855f7}
.demo-badge.mismatch .badge-dot{background:#ef4444}

.demo-confidence{display:flex;align-items:center;gap:10px}
.demo-conf-bar{flex:1;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;max-width:120px}
.demo-conf-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.demo-conf-num{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}

.demo-action{padding:12px 18px;background:#f8fafc;border-top:1px solid #e2e8f0;
  display:flex;align-items:center;gap:8px;font-size:12px;color:#64748b}
.demo-action .action-icon{width:20px;height:20px;border-radius:5px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0}
.demo-action .action-icon.email{background:#ecfdf5;color:#10b981}
.demo-action .action-icon.no-email{background:#fef2f2;color:#ef4444}
.demo-action .action-icon svg{width:12px;height:12px}

.demo-reset{margin:0 28px 16px;padding:10px;border:1.5px dashed #cbd5e1;border-radius:10px;
  background:transparent;color:#64748b;font-size:13px;font-weight:500;cursor:pointer;
  width:calc(100% - 56px);text-align:center;transition:all var(--transition)}
.demo-reset:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-10)}

/* ---- ERROR ---- */
.error-bar{display:none;padding:12px 28px;background:#fef2f2;color:#b91c1c;font-size:13px;
  border-bottom:1px solid #fecaca;text-align:center}
.error-bar.visible{display:block}

/* ---- MOBILE ---- */
@media(max-width:480px){
  .form-section{padding:24px 20px 20px}
  .messages{padding:16px 20px}
  .chat-input{padding:12px 16px}
  .contact-bar{padding:12px 20px}
  .form-section h1{font-size:20px}
}
</style>
</head>
<body>
<div class="card" id="card">
  <!-- Demo banner -->
  <div class="demo-banner" id="demoBanner">⚡ Demo Mode — No emails sent. AI analysis shown below.</div>

  <!-- Error bar -->
  <div class="error-bar" id="errorBar"></div>

  <!-- FORM -->
  <div class="form-section" id="formSection">
    <h1 id="heading">Get in Touch</h1>
    <p class="subtitle" id="subtitle">We'll get back to you as soon as possible.</p>
    <form id="contactForm" novalidate>
      <div class="field">
        <label for="fname">Name</label>
        <input type="text" id="fname" placeholder="Your name" required autocomplete="name">
      </div>
      <div class="field">
        <label for="femail">Email</label>
        <input type="email" id="femail" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="fphone">Phone</label>
        <input type="tel" id="fphone" placeholder="(555) 123-4567" autocomplete="tel">
      </div>
      <div class="field">
        <label for="fmsg">How can we help?</label>
        <textarea id="fmsg" placeholder="Tell us about your project or question..." required></textarea>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-text">Send Message</span>
        <div class="spinner"></div>
      </button>
    </form>
  </div>

  <!-- CHAT -->
  <div class="chat-section" id="chatSection">
    <div class="contact-bar">
      <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M5 12l5 5L19 7"/></svg></div>
      <div class="info"><strong id="chatName"></strong> · <span id="chatEmail"></span></div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="chat-input" id="chatInput">
      <input type="text" id="chatField" placeholder="Type your reply...">
      <button id="chatSend">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
  </div>

  <!-- SUCCESS -->
  <div class="success-section" id="successSection">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l5 5L19 7"/></svg>
    </div>
    <h2>Message sent!</h2>
    <p>We'll be in touch shortly.</p>
  </div>

  <!-- END (solicitor / job applicant) -->
  <div class="end-section" id="endSection">
    <div class="end-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-2)" stroke-width="2" width="28" height="28">
        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
    <h2 id="endTitle">Thanks for reaching out!</h2>
    <p id="endMsg"></p>
  </div>

  <!-- DEMO REVEAL PANEL -->
  <div class="demo-reveal" id="demoReveal">
    <div class="demo-reveal-header">
      <div class="demo-eye"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div>
      <div>
        <div class="demo-title">Behind the Scenes</div>
        <div class="demo-subtitle">What the AI decided and why</div>
      </div>
    </div>
    <div class="demo-reveal-body">
      <div class="demo-row">
        <div class="demo-row-label">Category</div>
        <div class="demo-row-value" id="demoCat"></div>
      </div>
      <div class="demo-row">
        <div class="demo-row-label">Confidence</div>
        <div class="demo-row-value"><div class="demo-confidence">
          <div class="demo-conf-bar"><div class="demo-conf-fill" id="demoConfFill"></div></div>
          <span class="demo-conf-num" id="demoConfNum"></span>
        </div></div>
      </div>
      <div class="demo-row">
        <div class="demo-row-label">Summary</div>
        <div class="demo-row-value" id="demoSummary"></div>
      </div>
      <div class="demo-row" id="demoValueRow">
        <div class="demo-row-label">Est. Value</div>
        <div class="demo-row-value" id="demoValue"></div>
      </div>
    </div>
    <div class="demo-action" id="demoAction"></div>
  </div>

  <!-- Demo reset button -->
  <button class="demo-reset" id="demoReset" style="display:none">↻ Try another submission</button>
</div>

<script>
(function(){
  // --- Extract client ID from URL path ---
  const path = window.location.pathname;
  const match = path.match(/\/(form|landing|widget)\/([^/?#]+)/);
  const clientId = match ? match[2] : '';
  const mode = match ? match[1] : 'form';

  if (mode === 'landing') document.body.classList.add('landing');

  // --- State ---
  let config = {};
  let leadId = null;
  let conversation = [];
  let followUpCount = 0;
  const MAX_FOLLOWUPS = 3;
  let isDemo = false;

  const $ = id => document.getElementById(id);
  const BASE = window.location.origin;

  // --- Init ---
  async function init() {
    if (!clientId) return;
    try {
      const r = await fetch(`${BASE}/config/${clientId}`);
      config = await r.json();
      // Apply branding
      if (config.brand_color) {
        document.documentElement.style.setProperty('--brand', config.brand_color);
        // Derive hover (darken 10%)
        document.documentElement.style.setProperty('--brand-hover', darken(config.brand_color, 15));
        document.documentElement.style.setProperty('--brand-10', config.brand_color + '1a');
      }
      // Demo mode
      if (config.demo_mode) {
        isDemo = true;
        document.body.classList.add('demo-mode');
      }
      // Inject Facebook Pixel (skip in demo)
      if (config.facebook_pixel_id && !isDemo) injectPixel(config.facebook_pixel_id);
    } catch(e) {
      console.warn('Config load error', e);
    }
  }
  init();

  // --- Demo mode helpers ---
  const CATEGORY_META = {
    QUALIFIED_LEAD:     { label: 'Qualified Lead', cls: 'qualified', icon: '✅' },
    NEEDS_CLARIFICATION:{ label: 'Needs Clarification', cls: 'clarification', icon: '🔄' },
    SOLICITOR:          { label: 'Solicitor / Vendor', cls: 'solicitor', icon: '📋' },
    JOB_APPLICANT:      { label: 'Job Applicant', cls: 'job', icon: '📋' },
    SCOPE_MISMATCH:     { label: 'Scope Mismatch', cls: 'mismatch', icon: '🚫' },
  };

  function showDemoReveal(demo) {
    if (!isDemo || !demo) return;
    const meta = CATEGORY_META[demo.category] || { label: demo.category, cls: 'clarification', icon: '❓' };

    // Category badge
    $('demoCat').innerHTML = `<span class="demo-badge ${meta.cls}"><span class="badge-dot"></span>${meta.icon} ${meta.label}</span>`;

    // Confidence bar
    const pct = Math.round((demo.confidence || 0) * 100);
    const fill = $('demoConfFill');
    fill.style.width = '0%';
    fill.style.background = pct >= 80 ? '#10b981' : pct >= 50 ? '#f59e0b' : '#ef4444';
    $('demoConfNum').textContent = pct + '%';
    setTimeout(() => { fill.style.width = pct + '%'; }, 50);

    // Summary
    $('demoSummary').textContent = demo.summary || '—';

    // Estimated value
    if (demo.estimated_value) {
      $('demoValueRow').style.display = '';
      $('demoValue').textContent = demo.estimated_value;
    } else {
      $('demoValueRow').style.display = 'none';
    }

    // Action row
    const actionEl = $('demoAction');
    if (demo.category === 'QUALIFIED_LEAD') {
      const emailTo = demo.would_email ? demo.email_recipient : 'not configured';
      actionEl.innerHTML = `<div class="action-icon email"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></div>
        <span>Email would be sent to <strong>${emailTo}</strong></span>`;
    } else if (demo.category === 'SOLICITOR' || demo.category === 'JOB_APPLICANT') {
      actionEl.innerHTML = `<div class="action-icon no-email"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 5.64l-12.72 12.72M12 22a10 10 0 110-20 10 10 0 010 20z"/></svg></div>
        <span>No email sent to owner — info kept on file</span>`;
    } else if (demo.category === 'NEEDS_CLARIFICATION') {
      actionEl.innerHTML = `<div class="action-icon email"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3M12 17h.01"/></svg></div>
        <span>Follow-up question asked — waiting for visitor reply</span>`;
    } else {
      actionEl.innerHTML = `<div class="action-icon no-email"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 5.64l-12.72 12.72M12 22a10 10 0 110-20 10 10 0 010 20z"/></svg></div>
        <span>Visitor redirected — not a matching service</span>`;
    }

    $('demoReveal').classList.add('active');
    $('demoReset').style.display = 'block';
    reportHeight();
  }

  // --- Demo reset ---
  $('demoReset').addEventListener('click', function() {
    // Reset all sections
    $('formSection').classList.remove('hidden');
    $('chatSection').classList.remove('active');
    $('successSection').classList.remove('active');
    $('endSection').classList.remove('active');
    $('demoReveal').classList.remove('active');
    $('demoReset').style.display = 'none';
    $('messages').innerHTML = '';

    // Reset form
    $('contactForm').reset();
    $('submitBtn').classList.remove('loading');
    $('submitBtn').disabled = false;
    $('chatInput').classList.remove('disabled');

    // Reset state
    leadId = null;
    conversation = [];
    followUpCount = 0;

    reportHeight();
    $('fname').focus();
  });

  // --- Darken hex color ---
  function darken(hex, pct) {
    hex = hex.replace('#','');
    let r = parseInt(hex.substring(0,2),16);
    let g = parseInt(hex.substring(2,4),16);
    let b = parseInt(hex.substring(4,6),16);
    r = Math.max(0, Math.round(r * (1 - pct/100)));
    g = Math.max(0, Math.round(g * (1 - pct/100)));
    b = Math.max(0, Math.round(b * (1 - pct/100)));
    return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
  }

  // --- Facebook Pixel ---
  function injectPixel(id) {
    if (window.fbq) return;
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}
    (window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', id);
    fbq('track', 'PageView');
  }

  function fireLeadEvent() {
    // Facebook Pixel
    if (window.fbq) fbq('track', 'Lead');
    // Google Ads
    if (window.gtag && config.google_ads_id && config.google_ads_label) {
      gtag('event', 'conversion', {
        send_to: `${config.google_ads_id}/${config.google_ads_label}`
      });
    }
    // Tell parent (for iframe embed mode)
    try { window.parent.postMessage({type:'smartform_lead'}, '*'); } catch(e){}
  }

  // --- Resize reporter (for iframe embed) ---
  function reportHeight() {
    try {
      const h = document.body.scrollHeight;
      window.parent.postMessage({type:'smartform_resize', height: h}, '*');
    } catch(e){}
  }
  const ro = new ResizeObserver(() => reportHeight());
  ro.observe(document.body);
  setTimeout(reportHeight, 100);

  // --- Form submit ---
  $('contactForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const name = $('fname').value.trim();
    const email = $('femail').value.trim();
    const phone = $('fphone').value.trim();
    const msg = $('fmsg').value.trim();

    // Basic validation
    if (!name || !email || !msg) {
      showError('Please fill in your name, email, and message.');
      return;
    }
    if (!email.includes('@') || !email.includes('.')) {
      showError('Please enter a valid email address.');
      return;
    }
    hideError();

    // Loading state
    const btn = $('submitBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const r = await fetch(`${BASE}/api/classify`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ client_id: clientId, name, email, phone, message: msg })
      });
      const data = await r.json();
      leadId = data.lead_id;
      conversation = [{ role: 'user', content: msg }];

      if (data.category === 'QUALIFIED_LEAD' && !data.response) {
        // Immediate send — success!
        if (!isDemo) fireLeadEvent();
        showSuccess();
        showDemoReveal(data.demo);
      } else if (data.end_conversation) {
        // Solicitor / Job applicant — polite end
        showEnd(data.category, data.response);
        showDemoReveal(data.demo);
      } else {
        // Needs more info — transition to chat
        conversation.push({ role: 'assistant', content: data.response });
        followUpCount++;
        transitionToChat(name, email, msg, data.response, data.category !== 'SCOPE_MISMATCH');
        showDemoReveal(data.demo);
      }
    } catch(err) {
      showError('Something went wrong — please try again.');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });

  // --- Transition from form to chat ---
  function transitionToChat(name, email, originalMsg, aiResponse, showInput) {
    $('formSection').classList.add('hidden');
    setTimeout(() => {
      $('chatName').textContent = name;
      $('chatEmail').textContent = email;
      $('chatSection').classList.add('active');

      // User's original message
      addMessage(originalMsg, 'user');

      // Typing indicator, then AI response
      const typing = showTyping();
      setTimeout(() => {
        typing.remove();
        addMessage(aiResponse, 'ai');
        if (!showInput) $('chatInput').classList.add('disabled');
        reportHeight();
      }, 800 + Math.random() * 400);

      reportHeight();
    }, 350);
  }

  // --- Chat follow-up ---
  async function sendFollowUp() {
    const input = $('chatField');
    const msg = input.value.trim();
    if (!msg) return;

    input.value = '';
    addMessage(msg, 'user');

    const typing = showTyping();
    $('chatInput').classList.add('disabled');

    try {
      const r = await fetch(`${BASE}/api/chat`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          client_id: clientId,
          lead_id: leadId,
          message: msg,
          conversation: conversation,
          name: $('fname').value.trim(),
          email: $('femail').value.trim(),
          phone: $('fphone').value.trim(),
        })
      });
      const data = await r.json();
      conversation.push({ role: 'user', content: msg });

      typing.remove();
      followUpCount++;

      if (data.category === 'QUALIFIED_LEAD' && !data.response) {
        if (!isDemo) fireLeadEvent();
        addMessage("Thanks — we've sent your info to the team. They'll be in touch shortly.", 'ai');
        $('chatInput').classList.add('disabled');
        showDemoReveal(data.demo);
        if (!isDemo) setTimeout(() => doRedirect(), 3000);
      } else if (data.end_conversation) {
        addMessage(data.response, 'ai');
        $('chatInput').classList.add('disabled');
        showDemoReveal(data.demo);
      } else if (followUpCount >= MAX_FOLLOWUPS) {
        if (!isDemo) fireLeadEvent();
        addMessage("Thanks for the details — we'll pass this to the team and be in touch.", 'ai');
        $('chatInput').classList.add('disabled');
        showDemoReveal(data.demo);
        if (!isDemo) setTimeout(() => doRedirect(), 3000);
      } else {
        conversation.push({ role: 'assistant', content: data.response });
        addMessage(data.response, 'ai');
        showDemoReveal(data.demo);
        $('chatInput').classList.remove('disabled');
        $('chatField').focus();
      }
      reportHeight();
    } catch(err) {
      typing.remove();
      addMessage("Something went wrong — your info has been saved and the team will follow up.", 'ai');
      $('chatInput').classList.add('disabled');
      reportHeight();
    }
  }

  $('chatSend').addEventListener('click', sendFollowUp);
  $('chatField').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFollowUp(); }
  });

  // --- Helpers ---
  function addMessage(text, type) {
    const div = document.createElement('div');
    div.className = 'msg msg-' + (type === 'user' ? 'user' : 'ai');
    div.textContent = text;
    $('messages').appendChild(div);
    $('messages').scrollTop = $('messages').scrollHeight;
    reportHeight();
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    $('messages').appendChild(div);
    $('messages').scrollTop = $('messages').scrollHeight;
    return div;
  }

  function showSuccess() {
    $('formSection').classList.add('hidden');
    setTimeout(() => {
      $('successSection').classList.add('active');
      reportHeight();
      setTimeout(() => doRedirect(), 3000);
    }, 350);
  }

  function showEnd(category, response) {
    $('formSection').classList.add('hidden');
    setTimeout(() => {
      if (category === 'JOB_APPLICANT') {
        $('endTitle').textContent = "Thanks for your interest!";
      } else {
        $('endTitle').textContent = "Thanks for reaching out!";
      }
      $('endMsg').textContent = response || "We've saved your information and will be in touch if something comes up.";
      $('endSection').classList.add('active');
      reportHeight();
    }, 350);
  }

  function doRedirect() {
    const url = config.thank_you_url;
    if (url) {
      try { window.parent.postMessage({type:'smartform_redirect', url: url}, '*'); } catch(e){}
      // If we're the top frame (landing mode), redirect directly
      if (window === window.parent) window.location.href = url;
    }
  }

  function showError(msg) {
    const bar = $('errorBar');
    bar.textContent = msg;
    bar.classList.add('visible');
    reportHeight();
  }
  function hideError() {
    $('errorBar').classList.remove('visible');
    reportHeight();
  }
})();
</script>
</body>
</html>
