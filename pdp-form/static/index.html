<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Premier Dating Photography</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #000;
    color: #fff;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #222;
    flex-shrink: 0;
  }
  .header img {
    height: 36px;
    width: auto;
  }
  .header .title {
    font-size: 14px;
    color: #999;
  }

  /* Chat area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    -webkit-overflow-scrolling: touch;
  }

  .message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.assistant {
    background: #1a1a1a;
    color: #e0e0e0;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .message.user {
    background: #EFC050;
    color: #000;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .message a {
    color: #EFC050;
    text-decoration: underline;
  }
  .message.user a {
    color: #000;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    align-self: flex-start;
  }
  .typing span {
    width: 8px;
    height: 8px;
    background: #555;
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.16s; }
  .typing span:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Input area */
  .input-area {
    padding: 12px 16px;
    border-top: 1px solid #222;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
    background: #000;
  }

  .input-area textarea {
    flex: 1;
    background: #111;
    border: 1px solid #333;
    border-radius: 20px;
    padding: 10px 16px;
    color: #fff;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 100px;
    min-height: 42px;
    line-height: 1.4;
  }
  .input-area textarea::placeholder { color: #666; }
  .input-area textarea:focus { border-color: #EFC050; }

  .send-btn {
    background: #EFC050;
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }
  .send-btn:disabled { opacity: 0.3; cursor: default; }
  .send-btn svg { width: 20px; height: 20px; fill: #000; }

  /* Contact form overlay */
  .form-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    justify-content: center;
    align-items: center;
    padding: 20px;
    animation: fadeIn 0.3s ease;
  }
  .form-overlay.active { display: flex; }

  .contact-form {
    background: #111;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 32px 28px;
    width: 100%;
    max-width: 420px;
  }
  .contact-form h2 {
    font-size: 20px;
    margin-bottom: 4px;
    color: #EFC050;
  }
  .contact-form .subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 20px;
  }
  .contact-form label {
    display: block;
    font-size: 13px;
    color: #999;
    margin-bottom: 4px;
    margin-top: 12px;
  }
  .contact-form input,
  .contact-form textarea {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 12px;
    color: #fff;
    font-size: 15px;
    font-family: inherit;
    outline: none;
  }
  .contact-form input:focus,
  .contact-form textarea:focus { border-color: #EFC050; }
  .contact-form textarea { resize: none; height: 60px; }

  .form-row {
    display: flex;
    gap: 10px;
  }
  .form-row > div { flex: 1; }

  .form-error {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 8px;
    display: none;
  }

  .form-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .btn-submit {
    flex: 1;
    background: #EFC050;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-submit:disabled { opacity: 0.5; }
  .btn-back {
    background: none;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 12px 16px;
    color: #999;
    font-size: 14px;
    cursor: pointer;
  }

  /* Consent */
  .consent {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    margin-top: 14px;
  }
  .consent input[type="checkbox"] {
    width: 16px;
    height: 16px;
    margin-top: 2px;
    flex-shrink: 0;
    accent-color: #EFC050;
  }
  .consent span {
    font-size: 12px;
    color: #888;
    line-height: 1.4;
  }

  /* CTA button in chat */
  .cta-btn {
    display: inline-block;
    background: #EFC050;
    color: #000;
    padding: 10px 20px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    cursor: pointer;
    border: none;
    margin-top: 8px;
  }
  .cta-btn:hover { opacity: 0.9; }
</style>
</head>
<body>

<div class="header">
  <img src="https://premierdatingphotography.com/wp-content/uploads/2024/05/pdp-logo-new.png" alt="PDP" onerror="this.style.display='none'">
  <div class="title">Premier Dating Photography</div>
</div>

<div class="chat-container" id="chatBox"></div>

<div class="input-area">
  <textarea id="userInput" rows="1" placeholder="Type a message..." autocomplete="off"></textarea>
  <button class="send-btn" id="sendBtn" disabled>
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<!-- Contact form overlay -->
<div class="form-overlay" id="formOverlay">
  <div class="contact-form">
    <h2>Let's connect you</h2>
    <p class="subtitle">The team will reach out to set up your free consultation.</p>

    <div class="form-row">
      <div>
        <label>First name *</label>
        <input type="text" id="fname" placeholder="First name" autocomplete="given-name">
      </div>
      <div>
        <label>Last name</label>
        <input type="text" id="lname" placeholder="Last name" autocomplete="family-name">
      </div>
    </div>

    <label>Email *</label>
    <input type="email" id="femail" placeholder="you@email.com" autocomplete="email">

    <label>Phone *</label>
    <input type="tel" id="fphone" placeholder="(555) 123-4567" autocomplete="tel">

    <label>Anything else?</label>
    <textarea id="fmessage" placeholder="Optional — anything you want the team to know"></textarea>

    <div class="consent">
      <input type="checkbox" id="fconsent" checked>
      <span>I agree to be contacted about Premier Dating Photography services.</span>
    </div>

    <div class="form-error" id="formError"></div>

    <div class="form-buttons">
      <button class="btn-back" onclick="closeForm()">← Back to chat</button>
      <button class="btn-submit" id="submitBtn" onclick="submitForm()">Send →</button>
    </div>
  </div>
</div>

<script>
  const chatBox = document.getElementById('chatBox');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const formOverlay = document.getElementById('formOverlay');

  let messages = [];  // conversation history for API
  let chatStarted = false;
  let formTriggered = false;
  let pageLoadTracked = false;

  // ── Funnel tracking ──
  function track(event) {
    fetch('/track', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ event }),
    }).catch(() => {});
  }
  track('page_loads');
  pageLoadTracked = true;

  // ── Opening message ──
  const opener = "Hey! What brings you to Premier Dating Photography today?";
  addMessage('assistant', opener);

  // ── Auto-resize textarea ──
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px';
    sendBtn.disabled = !userInput.value.trim();
  });

  // ── Enter to send ──
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (userInput.value.trim()) sendMessage();
    }
  });

  sendBtn.addEventListener('click', () => {
    if (userInput.value.trim()) sendMessage();
  });

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    // Convert URLs to links
    div.innerHTML = text.replace(
      /(https?:\/\/[^\s<)]+)/g,
      '<a href="$1" target="_blank" rel="noopener">$1</a>'
    );
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function showContactButton() {
    if (formTriggered) return;
    formTriggered = true;
    track('form_shown');

    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'align-self: flex-start; animation: fadeIn 0.3s ease;';
    wrapper.innerHTML = '<button class="cta-btn" onclick="openForm()">Get in Touch →</button>';
    chatBox.appendChild(wrapper);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    if (!chatStarted) {
      chatStarted = true;
      track('chat_started');
    }
    track('messages_sent');

    // Show user message
    addMessage('user', text);
    messages.push({ role: 'user', content: text });

    // Clear input
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;

    // Show typing
    showTyping();

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages }),
      });
      const data = await resp.json();
      hideTyping();

      const reply = data.reply || "Sorry, something went wrong.";
      addMessage('assistant', reply);
      messages.push({ role: 'assistant', content: reply });

      // Show contact form button if AI triggered it
      if (data.show_form) {
        showContactButton();
      }
    } catch (err) {
      hideTyping();
      addMessage('assistant', "Something went wrong on my end. You can reach the team directly at premierdatingphotography.com.");
    }
  }

  // ── Contact form ──
  function openForm() {
    formOverlay.classList.add('active');
    track('form_started');
    document.getElementById('fname').focus();
  }

  function closeForm() {
    formOverlay.classList.remove('active');
  }

  async function submitForm() {
    const fname = document.getElementById('fname').value.trim();
    const lname = document.getElementById('lname').value.trim();
    const email = document.getElementById('femail').value.trim();
    const phone = document.getElementById('fphone').value.trim();
    const message = document.getElementById('fmessage').value.trim();
    const consent = document.getElementById('fconsent').checked;
    const errEl = document.getElementById('formError');
    const btn = document.getElementById('submitBtn');

    errEl.style.display = 'none';

    if (!fname) { showFormError('Please enter your first name.'); return; }
    if (!email || !email.includes('@')) { showFormError('Please enter a valid email.'); return; }
    if (!phone) { showFormError('Please enter your phone number.'); return; }
    if (!consent) { showFormError('Please agree to be contacted.'); return; }

    // Build summary from chat
    const userMessages = messages.filter(m => m.role === 'user').map(m => m.content);
    const summary = userMessages.join(' | ');

    btn.disabled = true;
    btn.textContent = 'Sending...';

    try {
      const resp = await fetch('/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          first_name: fname,
          last_name: lname,
          email,
          phone,
          message,
          summary,
        }),
      });
      const data = await resp.json();

      if (data.ok) {
        track('submitted');
        window.location.href = data.redirect;
      } else {
        showFormError(data.error || 'Something went wrong.');
        btn.disabled = false;
        btn.textContent = 'Send →';
      }
    } catch (err) {
      showFormError('Network error. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Send →';
    }
  }

  function showFormError(msg) {
    const el = document.getElementById('formError');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // ── Mobile keyboard handling ──
  const vv = window.visualViewport;
  if (vv) {
    vv.addEventListener('resize', () => {
      document.body.style.height = vv.height + 'px';
      chatBox.scrollTop = chatBox.scrollHeight;
    });
  }
</script>
</body>
</html>
