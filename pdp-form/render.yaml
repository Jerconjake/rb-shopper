services:
  - type: web
    name: pdp-form
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GHL_TOKEN
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
