<!doctype html>
<html data-theme="rb-dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Revolution Boutique · Personal Shopper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daisyui@5" type="text/css" />
    <style>
[data-theme='rb-dark'] {
  color-scheme: dark;
  --radius-selector: 0rem;
  --radius-field: 0rem;
  --radius-box: 0rem;
  --size-selector: 0.25rem;
  --size-field: 0.25rem;
  --border: 1px;
  --depth: 0;
  --noise: 0;
  --color-base-100: #080808;
  --color-base-200: #111111;
  --color-base-300: #1c1c1c;
  --color-base-content: #f0ece4;
  --color-primary: #c4a26e;
  --color-primary-content: #080808;
  --color-secondary: rgba(240,236,228,0.5);
  --color-secondary-content: #080808;
  --color-accent: #c4a26e;
  --color-accent-content: #080808;
  --color-neutral: #1c1c1c;
  --color-neutral-content: #f0ece4;
  --color-info: rgba(240,236,228,0.5);
  --color-info-content: #080808;
  --color-success: #9caa8e;
  --color-success-content: #080808;
  --color-warning: #c4a26e;
  --color-warning-content: #080808;
  --color-error: #c97a7a;
  --color-error-content: #080808;
}

*, *::before, *::after { box-sizing: border-box; }

html, body, #root {
  height: 100%;
  margin: 0;
  background: #080808;
}

body {
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(240,236,228,0.1); }
::-webkit-scrollbar-thumb:hover { background: rgba(240,236,228,0.2); }

/* Typography */
.font-editorial { font-family: 'Cormorant Garamond', serif; }

/* Animations */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes goldPulse {
  0%, 100% { opacity: 0.25; transform: scale(0.85); }
  50%       { opacity: 1;    transform: scale(1); }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}

.fade-slide-up { animation: fadeSlideUp 0.35s cubic-bezier(0.16,1,0.3,1) both; }

/* Typing dots */
.typing-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #c4a26e;
  display: inline-block;
  animation: goldPulse 1.4s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

/* Suggestion chips */
.suggestion-chip {
  border: 1px solid rgba(240,236,228,0.1);
  color: rgba(240,236,228,0.45);
  background: transparent;
  padding: 7px 14px;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.3px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  white-space: nowrap;
}
.suggestion-chip:hover { border-color: #c4a26e; color: #c4a26e; }
.suggestion-chip:disabled { opacity: 0.3; cursor: not-allowed; }

/* Product card */
.rb-product-card {
  background: #0f0f0f;
  border: 1px solid rgba(240,236,228,0.06);
  width: 152px;
  flex-shrink: 0;
  transition: border-color 0.25s, box-shadow 0.25s;
  overflow: hidden;
  cursor: pointer;
}
.rb-product-card:hover {
  border-color: rgba(196,162,110,0.5);
  box-shadow: 0 0 20px rgba(196,162,110,0.08);
}

/* Add to cart button */
.btn-add-luxury {
  flex: 1;
  background: transparent;
  border: 1px solid rgba(240,236,228,0.15);
  color: rgba(240,236,228,0.6);
  padding: 5px 10px;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}
.btn-add-luxury:hover {
  background: #c4a26e;
  border-color: #c4a26e;
  color: #080808;
}

/* Icon button */
.btn-icon-luxury {
  background: transparent;
  border: none;
  color: rgba(240,236,228,0.2);
  cursor: pointer;
  padding: 5px;
  transition: color 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.btn-icon-luxury:hover { color: rgba(240,236,228,0.6); }

/* Send button */
.btn-send-luxury {
  background: #f0ece4;
  border: none;
  color: #080808;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.2s;
}
.btn-send-luxury:hover:not(:disabled) { background: #c4a26e; }
.btn-send-luxury:disabled { opacity: 0.3; cursor: not-allowed; }

/* Chat input */
.chat-textarea {
  background: transparent;
  border: none;
  outline: none;
  color: #f0ece4;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  resize: none;
  width: 100%;
  padding: 10px 0;
  line-height: 1.5;
}
.chat-textarea::placeholder { color: rgba(240,236,228,0.2); }

/* Handoff button */
.btn-handoff-luxury {
  background: transparent;
  border: none;
  color: rgba(240,236,228,0.25);
  font-size: 11px;
  letter-spacing: 0.3px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: color 0.2s;
  padding: 4px 0;
  display: flex; align-items: center; gap: 5px;
}
.btn-handoff-luxury:hover { color: #c4a26e; }
.btn-handoff-luxury:disabled { opacity: 0.3; cursor: not-allowed; }

/* Cart button */
.btn-cart-luxury {
  background: transparent;
  border: none;
  color: rgba(240,236,228,0.5);
  cursor: pointer;
  padding: 6px;
  position: relative;
  transition: color 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.btn-cart-luxury:hover { color: #f0ece4; }

/* PIN enter button */
.btn-pin-enter {
  background: #f0ece4;
  border: none;
  color: #080808;
  padding: 14px;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  cursor: pointer;
  width: 100%;
  transition: background 0.2s;
  margin-top: 8px;
}
.btn-pin-enter:hover { background: #c4a26e; }

/* PIN input */
.pin-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(240,236,228,0.15);
  color: #f0ece4;
  font-size: 20px;
  text-align: center;
  letter-spacing: 10px;
  padding: 12px 0;
  outline: none;
  width: 100%;
  font-family: 'Inter', sans-serif;
  transition: border-color 0.2s;
}
.pin-input:focus { border-bottom-color: rgba(240,236,228,0.4); }
.pin-input.error { border-bottom-color: #c97a7a; }
.pin-input::placeholder { letter-spacing: 6px; color: rgba(240,236,228,0.15); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body style="background:#080808;">
    <div id="root"></div>
    <script type="module" src="/src/app.tsx"></script>
  </body>
</html>
