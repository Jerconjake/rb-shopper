<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Revolution Boutique · Personal Shopper</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daisyui@5" type="text/css" />
    <style>
[data-theme='rb-light'] {
  color-scheme: light;
  --radius-selector: 0rem;
  --radius-field: 0rem;
  --radius-box: 0rem;
  --size-selector: 0.25rem;
  --size-field: 0.25rem;
  --border: 1px;
  --depth: 0;
  --noise: 0;
  --color-base-100: #ffffff;
  --color-base-200: #f5f5f5;
  --color-base-300: #e0e0e0;
  --color-base-content: #111111;
  --color-primary: #111111;
  --color-primary-content: #ffffff;
  --color-secondary: #444444;
  --color-secondary-content: #ffffff;
  --color-accent: #111111;
  --color-accent-content: #ffffff;
  --color-neutral: #111111;
  --color-neutral-content: #ffffff;
  --color-info: #555555;
  --color-info-content: #ffffff;
  --color-success: #333333;
  --color-success-content: #ffffff;
  --color-warning: #777777;
  --color-warning-content: #111111;
  --color-error: #111111;
  --color-error-content: #ffffff;
}
[data-theme='rb-dark'] {
  color-scheme: dark;
  --radius-selector: 0rem;
  --radius-field: 0rem;
  --radius-box: 0rem;
  --size-selector: 0.25rem;
  --size-field: 0.25rem;
  --border: 1px;
  --depth: 0;
  --noise: 0;
  --color-base-100: #0a0a0a;
  --color-base-200: #141414;
  --color-base-300: #222222;
  --color-base-content: #f0f0f0;
  --color-primary: #f0f0f0;
  --color-primary-content: #0a0a0a;
  --color-secondary: #aaaaaa;
  --color-secondary-content: #0a0a0a;
  --color-accent: #f0f0f0;
  --color-accent-content: #0a0a0a;
  --color-neutral: #f0f0f0;
  --color-neutral-content: #0a0a0a;
  --color-info: #aaaaaa;
  --color-info-content: #0a0a0a;
  --color-success: #cccccc;
  --color-success-content: #0a0a0a;
  --color-warning: #888888;
  --color-warning-content: #f0f0f0;
  --color-error: #f0f0f0;
  --color-error-content: #0a0a0a;
}
html, body, #root { height: 100%; margin: 0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script>
      (function() {
        var theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'rb-dark' : 'rb-light';
        document.documentElement.setAttribute('data-theme', theme);
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
          document.documentElement.setAttribute('data-theme', e.matches ? 'rb-dark' : 'rb-light');
        });
      })();
    </script>
  </head>
  <body class="bg-base-100 text-base-content">
    <div id="root"></div>
    <script type="module" src="/src/app.tsx"></script>
  </body>
</html>
